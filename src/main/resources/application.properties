# === Servidor ===
server.port=8080

# === Banco de Dados (MySQL via Docker Compose) ===
spring.datasource.url=jdbc:mysql://mysql:3306/portalweb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# === Webhook do professor ===
app.webhook.url=${APP_WEBHOOK_URL:https://webhook.site/02f27cb8-94db-4650-9b1a-556a5ddfa7f1}

# === Logs ===
logging.level.org.springframework=INFO
logging.level.br.com.portalweb=DEBUG
